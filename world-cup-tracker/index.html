<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>World Cup 2026 — Last 32</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#060a12;
  --card:#0e1420;
  --border:rgba(255,255,255,0.07);
  --border-hi:rgba(255,255,255,0.13);
  --text:#e2e8f0;
  --muted:#4e5a70;
  --green:#22c55e;
  --green-dim:rgba(34,197,94,0.11);
  --gold:#f59e0b;
  --red:#ef4444;
}

html{font-size:16px}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  min-height:100vh;
  padding-bottom:60px;
  -webkit-font-smoothing:antialiased;
}

/* ── CANVAS PARTICLES ─── */
#bg{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;
}

/* ── WRAPPER ─── */
.app{
  position:relative;z-index:1;
  max-width:520px;margin:0 auto;
}

/* ── HEADER ─── */
.site-header{
  position:sticky;top:0;z-index:100;
  padding:14px 16px 16px;
  background:rgba(6,10,18,0.82);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  border-bottom:1px solid rgba(34,197,94,0.18);
  overflow:hidden;
}
.pitch-deco{
  position:absolute;inset:0;
  pointer-events:none;opacity:0.055;
}
.pitch-deco svg{width:100%;height:100%}

.back-link{
  display:inline-flex;align-items:center;gap:4px;
  font-size:.63rem;color:rgba(255,255,255,.28);
  text-decoration:none;letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:10px;transition:color .15s;
}
.back-link:hover{color:rgba(255,255,255,.6)}
.back-link svg{width:11px;height:11px}

.site-header h1{
  font-size:1.35rem;font-weight:800;letter-spacing:-.03em;
  display:flex;align-items:center;gap:9px;line-height:1;
}
.ball{display:inline-block;animation:spin 10s linear infinite;font-size:1.5rem}
@keyframes spin{to{transform:rotate(360deg)}}

.subtitle{font-size:.68rem;color:var(--muted);margin-top:5px;letter-spacing:.02em}

.progress-wrap{margin-top:13px}
.progress-track{
  height:4px;background:rgba(255,255,255,.06);
  border-radius:4px;overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--green),#38bdf8);
  box-shadow:0 0 10px rgba(34,197,94,.5);
  transition:width .6s cubic-bezier(.4,0,.2,1);
}
.progress-labels{
  display:flex;justify-content:space-between;
  margin-top:5px;font-size:.61rem;color:var(--muted);
}

/* ── LEADERBOARD ─── */
.lb-wrap{padding:12px 12px 0}
.lb-card{
  background:rgba(255,255,255,.035);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--border-hi);
  border-radius:16px;padding:14px 14px 12px;
}
.lb-title{
  font-size:.63rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.12em;color:var(--gold);
  margin-bottom:13px;display:flex;align-items:center;gap:6px;
}
.lb-rows{display:flex;flex-direction:column;gap:9px}
.lb-row{
  display:grid;
  grid-template-columns:26px 46px 1fr 30px 36px;
  align-items:center;gap:6px;
}
.lb-rank{font-size:.72rem;font-weight:700;text-align:center;color:var(--muted)}
.lb-rank.r1{color:#f0c060;text-shadow:0 0 10px rgba(240,192,96,.55)}
.lb-rank.r2{color:#b0bec5}
.lb-rank.r3{color:#bf8a5a}
.lb-badge{
  font-size:.65rem;font-weight:700;padding:4px 0;
  border-radius:7px;text-align:center;letter-spacing:.02em;
}
.lb-bar-bg{
  background:rgba(255,255,255,.05);
  border-radius:4px;height:20px;overflow:hidden;
}
.lb-bar-fill{
  height:100%;border-radius:4px;
  display:flex;align-items:center;padding-right:6px;justify-content:flex-end;
  transition:width .85s cubic-bezier(.4,0,.2,1);
}
.lb-bar-fill span{font-size:.6rem;font-weight:700;color:rgba(255,255,255,.9)}
.lb-pts{font-size:.95rem;font-weight:800;text-align:right}
.lb-max{font-size:.58rem;color:var(--muted);text-align:right;line-height:1.2}

/* ── LEGEND ─── */
.legend{
  display:flex;gap:6px;flex-wrap:wrap;align-items:center;
  padding:7px 12px;margin:8px 12px 0;
  background:rgba(255,255,255,.025);
  border:1px solid var(--border);border-radius:10px;
}
.legend-label{font-size:.58rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-right:2px}
.chip{
  font-size:.6rem;font-weight:700;padding:3px 8px;
  border-radius:6px;letter-spacing:.03em;
}

/* ── SECTION LABEL ─── */
.section-label{
  padding:14px 12px 6px;
  font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;
  color:var(--muted);font-weight:600;
}

/* ── MATCH CARDS ─── */
.matches{padding:0 12px;display:flex;flex-direction:column;gap:8px}

.match-card{
  background:var(--card);
  border:1px solid var(--border);border-radius:16px;overflow:hidden;
  transition:border-color .3s;
}
.match-card.has-result{border-color:rgba(34,197,94,.22)}

@keyframes flash{
  0%  {box-shadow:0 0 0 0 rgba(34,197,94,.55)}
  65% {box-shadow:0 0 0 20px rgba(34,197,94,0)}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}
}
.match-card.just-set{animation:flash .65s ease}

.match-meta{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 13px 0;
  font-size:.57rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.07em;font-weight:600;
}
.status-done{color:var(--green)}

.match-body{
  display:grid;grid-template-columns:1fr 38px 1fr;
  align-items:center;padding:10px 8px 8px;
}

.team-btn{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:10px 5px 9px;border-radius:12px;
  border:1.5px solid transparent;
  background:rgba(255,255,255,.02);
  color:inherit;font-family:inherit;cursor:pointer;
  transition:background .15s,border-color .2s,opacity .25s,transform .12s;
  width:100%;-webkit-appearance:none;
}
.team-btn:active{transform:scale(0.95)}
.team-btn.winner{
  background:var(--green-dim);
  border-color:rgba(34,197,94,.35);
  box-shadow:0 0 18px rgba(34,197,94,.12);
}
.team-btn.loser{opacity:.22;filter:grayscale(.8)}

.team-flag{
  font-size:2.3rem;line-height:1;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.5));
}
.team-name{
  font-size:.74rem;font-weight:700;text-align:center;
  line-height:1.25;min-height:2.1em;
  display:flex;align-items:center;justify-content:center;
}
.team-picks{
  display:flex;flex-wrap:wrap;gap:3px;justify-content:center;min-height:20px;
}
.pick-chip{
  font-size:.55rem;font-weight:700;padding:2px 6px;
  border-radius:5px;letter-spacing:.03em;transition:opacity .2s;
}
.pick-chip.wrong{opacity:.22;text-decoration:line-through}

.vs-col{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:6px;
}
.vs-text{font-size:.6rem;font-weight:700;color:var(--muted);letter-spacing:.04em}
@keyframes pop{
  0%  {transform:scale(0) rotate(-20deg);opacity:0}
  70% {transform:scale(1.25) rotate(5deg)}
  100%{transform:scale(1) rotate(0);opacity:1}
}
.result-trophy{font-size:1.1rem;animation:pop .4s cubic-bezier(.3,1.5,.5,1) both}

.match-footer{padding:0 13px 11px;text-align:center}
.tap-hint{font-size:.58rem;color:var(--muted);letter-spacing:.02em}
.result-row{
  display:flex;align-items:center;justify-content:center;
  gap:5px;font-size:.63rem;flex-wrap:wrap;line-height:1.9;
}
.correct-list{color:var(--green);font-weight:700}
.wrong-list{color:var(--muted)}
.btn-clear{
  background:none;border:none;cursor:pointer;
  font-size:.6rem;color:var(--muted);text-decoration:underline;
  padding:2px 4px;font-family:inherit;transition:color .15s;
}
.btn-clear:hover{color:var(--red)}

/* ── PLAYER COLOURS ─── */
.c-ah{background:rgba(239,68,68,.22);color:#fca5a5;border:1px solid rgba(239,68,68,.38)}
.c-dh{background:rgba(59,130,246,.22);color:#93c5fd;border:1px solid rgba(59,130,246,.38)}
.c-dt{background:rgba(34,197,94,.22);color:#86efac;border:1px solid rgba(34,197,94,.38)}
.c-lt{background:rgba(168,85,247,.22);color:#d8b4fe;border:1px solid rgba(168,85,247,.38)}
.c-th{background:rgba(245,158,11,.22);color:#fcd34d;border:1px solid rgba(245,158,11,.38)}

.fill-ah{background:linear-gradient(90deg,#991b1b,#ef4444)}
.fill-dh{background:linear-gradient(90deg,#1e3a8a,#3b82f6)}
.fill-dt{background:linear-gradient(90deg,#14532d,#22c55e)}
.fill-lt{background:linear-gradient(90deg,#581c87,#a855f7)}
.fill-th{background:linear-gradient(90deg,#78350f,#f59e0b)}

/* ── RESPONSIVE ─── */
@media(min-width:400px){
  .team-flag{font-size:2.6rem}
  .team-name{font-size:.8rem}
}
@media(min-width:520px){
  .site-header h1{font-size:1.5rem}
  .app{padding:0 4px}
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="app">

<header class="site-header">
  <div class="pitch-deco">
    <svg viewBox="0 0 500 90" preserveAspectRatio="xMidYMid slice" fill="none" stroke="white" stroke-width="1.2">
      <rect x="8" y="6" width="484" height="78" rx="2"/>
      <line x1="250" y1="6" x2="250" y2="84"/>
      <circle cx="250" cy="45" r="24"/>
      <circle cx="250" cy="45" r="2.5" fill="white" stroke="none"/>
      <rect x="8" y="23" width="54" height="44"/>
      <rect x="8" y="31" width="22" height="28"/>
      <rect x="438" y="23" width="54" height="44"/>
      <rect x="470" y="31" width="22" height="28"/>
      <circle cx="48" cy="45" r="2" fill="white" stroke="none"/>
      <circle cx="452" cy="45" r="2" fill="white" stroke="none"/>
    </svg>
  </div>
  <a href="/apps/" class="back-link">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3L5 8l5 5"/></svg>
    All apps
  </a>
  <h1><span class="ball">⚽</span> World Cup 2026</h1>
  <p class="subtitle">Last 32 · Tap a team to record the winner</p>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-labels">
      <span id="progressText">0 of 16 results entered</span>
      <span id="progressPct">0%</span>
    </div>
  </div>
</header>

<div class="lb-wrap">
  <div class="lb-card">
    <div class="lb-title">🏆 Leaderboard</div>
    <div class="lb-rows" id="lbRows"></div>
  </div>
</div>

<div class="legend" id="legend"></div>

<div class="section-label">Round of 32 · Matches</div>
<div class="matches" id="matches"></div>

</div>

<script>
/* ── PARTICLES ─────────────────────────────── */
(function(){
  const cv = document.getElementById('bg');
  const cx = cv.getContext('2d');
  const COLS = [[255,255,255],[34,197,94],[245,158,11],[56,189,248]];
  const WTS  = [.54,.22,.13,.11];
  let W, H, pts = [];

  function mkPt(){
    let r=Math.random(), a=0, ci=0;
    for(let i=0;i<WTS.length;i++){a+=WTS[i];if(r<a){ci=i;break;}}
    const c=COLS[ci];
    return{
      x:Math.random()*(W||800), y:Math.random()*(H||600),
      r:Math.random()*1.4+0.4,
      vy:Math.random()*.32+.08,
      phase:Math.random()*Math.PI*2,
      amp:Math.random()*.32+.05,
      spd:Math.random()*.017+.008,
      alpha:Math.random()*.2+.04,
      c, t:Math.random()*100,
    };
  }

  function resize(){
    W=cv.width=window.innerWidth;
    H=cv.height=window.innerHeight;
  }
  window.addEventListener('resize',resize,{passive:true});
  resize();
  for(let i=0;i<58;i++) pts.push(mkPt());

  function frame(){
    cx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.t+=p.spd;
      p.y-=p.vy;
      p.x+=Math.sin(p.t+p.phase)*p.amp;
      if(p.y<-6){p.y=H+6;p.x=Math.random()*W;}
      if(p.x<-6)p.x=W+6;
      if(p.x>W+6)p.x=-6;
      const a=p.alpha*(0.5+0.5*Math.sin(p.t*2.4+p.phase));
      cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
      cx.fillStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${a})`;
      cx.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

/* ── DATA ─────────────────────────────────── */
const PLAYERS = ['AH','DH','DT','LT','TH'];
const PC = {AH:'ah',DH:'dh',DT:'dt',LT:'lt',TH:'th'};
const MEDALS = ['🥇','🥈','🥉'];

let MATCHES = [], OFFICIAL = {};
let results = {};
try{results=JSON.parse(localStorage.getItem('wc26_results')||'{}');}catch(e){}
function save(){try{localStorage.setItem('wc26_results',JSON.stringify(results));}catch(e){}}

/* ── SCORES ────────────────────────────────── */
function scores(){
  const s={},pend={};
  PLAYERS.forEach(p=>{s[p]=0;pend[p]=0;});
  MATCHES.forEach(m=>{
    const r=results[m.id];
    PLAYERS.forEach(p=>{ r!=null?(m.p[p]===r&&s[p]++):pend[p]++; });
  });
  return{s,pend};
}

/* ── LEGEND ────────────────────────────────── */
function renderLegend(){
  document.getElementById('legend').innerHTML =
    `<span class="legend-label">Players:</span>` +
    PLAYERS.map(p=>`<span class="chip c-${PC[p]}">${p}</span>`).join('');
}

/* ── LEADERBOARD ───────────────────────────── */
function renderLeaderboard(){
  const {s,pend}=scores();
  const rows=PLAYERS.map(p=>({p,score:s[p],pend:pend[p]}))
    .sort((a,b)=>b.score-a.score||a.p.localeCompare(b.p));
  document.getElementById('lbRows').innerHTML=rows.map(({p,score,pend},i)=>{
    const pct=Math.round(score/16*100);
    const rCls=i<3?`r${i+1}`:'';
    const rank=i<3?MEDALS[i]:`${i+1}.`;
    return `<div class="lb-row">
      <div class="lb-rank ${rCls}">${rank}</div>
      <div class="lb-badge chip c-${PC[p]}">${p}</div>
      <div class="lb-bar-bg">
        <div class="lb-bar-fill fill-${PC[p]}" style="width:${pct}%">
          ${score>0?`<span>${score}</span>`:''}
        </div>
      </div>
      <div class="lb-pts">${score}</div>
      <div class="lb-max">${pend>0?`+${pend}?`:''}</div>
    </div>`;
  }).join('');
}

/* ── MATCHES ───────────────────────────────── */
function renderMatches(){
  document.getElementById('matches').innerHTML=MATCHES.map(m=>{
    const r=results[m.id], done=r!=null;
    const t1p=PLAYERS.filter(p=>m.p[p]===1);
    const t2p=PLAYERS.filter(p=>m.p[p]===2);
    const correct=done?PLAYERS.filter(p=>m.p[p]===r):[];
    const wrong  =done?PLAYERS.filter(p=>m.p[p]!==r):[];
    const chips=picks=>picks.map(p=>{
      const w=done&&m.p[p]!==r;
      return `<span class="pick-chip c-${PC[p]}${w?' wrong':''}">${p}</span>`;
    }).join('');
    const c1=done?(r===1?'winner':'loser'):'';
    const c2=done?(r===2?'winner':'loser'):'';
    const wName=done?(r===1?m.t1.n:m.t2.n):'';
    return `<div class="match-card${done?' has-result':''}" id="mc${m.id}">
      <div class="match-meta">
        <span>Match ${m.id}</span>
        <span class="${done?'status-done':''}">${done?`✓ ${wName}`:'pending'}</span>
      </div>
      <div class="match-body">
        <button class="team-btn ${c1}" onclick="setResult(${m.id},1)">
          <div class="team-flag">${m.t1.f}</div>
          <div class="team-name">${m.t1.n}</div>
          <div class="team-picks">${chips(t1p)}</div>
        </button>
        <div class="vs-col">
          <div class="vs-text">VS</div>
          ${done?`<div class="result-trophy">🏆</div>`:''}
        </div>
        <button class="team-btn ${c2}" onclick="setResult(${m.id},2)">
          <div class="team-flag">${m.t2.f}</div>
          <div class="team-name">${m.t2.n}</div>
          <div class="team-picks">${chips(t2p)}</div>
        </button>
      </div>
      <div class="match-footer">
        ${done
          ?`<div class="result-row">
              <span class="correct-list">✅ ${correct.join(' · ')}</span>
              <span class="wrong-list">&nbsp;❌ ${wrong.join(' · ')}</span>
              &nbsp;<button class="btn-clear" onclick="clearResult(${m.id})">clear</button>
            </div>`
          :`<div class="tap-hint">tap a team to set the winner</div>`
        }
      </div>
    </div>`;
  }).join('');
}

/* ── PROGRESS ──────────────────────────────── */
function updateProgress(){
  const done=Object.keys(results).length, tot=MATCHES.length;
  const pct=Math.round(done/tot*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=`${done} of ${tot} results entered`;
  document.getElementById('progressPct').textContent=pct+'%';
}

/* ── ACTIONS ───────────────────────────────── */
function setResult(id,winner){
  results[id]=winner; save(); render();
  const el=document.getElementById('mc'+id);
  if(el){el.classList.add('just-set');setTimeout(()=>el.classList.remove('just-set'),700);}
}
function clearResult(id){ delete results[id]; save(); render(); }

function render(){
  renderLeaderboard();
  renderMatches();
  updateProgress();
}

fetch('data.json')
  .then(r=>r.json())
  .then(d=>{
    MATCHES=d.matches;
    OFFICIAL=d.official||{};
    Object.entries(OFFICIAL).forEach(([id,w])=>{ if(results[+id]==null) results[+id]=w; });
    renderLegend();
    render();
  })
  .catch(()=>{ document.getElementById('matches').innerHTML='<p style="color:var(--red);padding:16px">Failed to load data.json</p>'; });
</script>
</body>
</html>
