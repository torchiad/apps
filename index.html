<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allotment Hose Planner</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="wrap">
        <h2 class="sr-only">Allotment hose planner — draw watering routes over your plot grid</h2>

        <div class="toolbar">
            <label>Hose colour:</label>
            <span class="swatch sel" style="background:#1D9E75" data-color="#1D9E75" title="Green"></span>
            <span class="swatch" style="background:#378ADD" data-color="#378ADD" title="Blue"></span>
            <span class="swatch" style="background:#D85A30" data-color="#D85A30" title="Orange"></span>
            <span class="swatch" style="background:#888780" data-color="#888780" title="Grey"></span>
            <label style="margin-left:8px">Width:</label>
            <input type="range" min="3" max="20" value="8" step="1" id="thickness" style="width:80px">
            <span id="thick-out" style="font-size:13px;min-width:24px">8</span>
            <button id="btn-undo" disabled>↩ Undo</button>
            <button id="btn-redo" disabled>↪ Redo</button>
            <button id="btn-clear">Clear hoses</button>
        </div>

        <div class="canvas-wrap">
            <canvas id="grid-canvas"></canvas>
            <canvas id="draw-canvas"
                style="position:absolute;top:0;left:0;width:100%;cursor:crosshair;touch-action:none;border-radius:var(--border-radius-lg)"></canvas>
        </div>
        <div class="status" id="status">Draw hose runs across your plot</div>
    </div>

    <script type="module" src="./app.js"></script>
</body>

</html>
