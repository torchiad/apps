<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hose Planner — draw watering routes over your allotment plot grid</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10243a;--paper:#f6f1e7;--card:#fffdf8;
    --accent:#2d9e5f;--accent2:#b8e6c8;
    --hair:rgba(16,36,58,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Newsreader',serif;background:var(--paper);color:var(--ink);
    background-image:radial-gradient(circle at 12% 8%,rgba(45,158,95,.06),transparent 40%)}
  .wrap{max-width:760px;margin:0 auto;padding:0 18px 70px}

  .back-link{display:inline-block;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;
    text-transform:uppercase;margin:18px 0 0;color:var(--ink);text-decoration:none;opacity:.45}
  .back-link:hover{opacity:1}

  header{padding:28px 0 14px;border-bottom:2px solid var(--ink)}
  .kicker{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:500}
  header h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(36px,8vw,58px);line-height:.92;letter-spacing:-2px;margin:6px 0 0}
  header h1 em{font-family:'Newsreader',serif;font-style:italic;font-weight:400;color:var(--accent)}
  .standfirst{font-size:15px;max-width:46ch;margin-top:10px;opacity:.75;line-height:1.45}

  .panel{background:var(--card);border:2px solid var(--ink);margin-top:22px;box-shadow:6px 6px 0 var(--ink);overflow:hidden}

  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 14px;border-bottom:2px solid var(--ink);background:var(--paper)}
  .toolbar label{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.5px;opacity:.6}
  .swatches{display:flex;gap:6px;align-items:center}
  .swatch{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;display:inline-block;transition:.12s}
  .swatch.sel{border-color:var(--ink);transform:scale(1.15)}
  .thickness-group{display:flex;align-items:center;gap:6px}
  input[type=range]{-webkit-appearance:none;width:72px;height:5px;border-radius:5px;border:1.5px solid var(--ink);background:linear-gradient(90deg,var(--accent2),var(--accent));cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--card);border:2.5px solid var(--ink);cursor:grab}
  .thick-out{font-family:'DM Mono',monospace;font-size:12px;min-width:20px;text-align:center}
  .toolbar-btns{display:flex;gap:6px;margin-left:auto}
  .tbtn{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.5px;border:1.5px solid var(--ink);border-radius:4px;padding:5px 11px;cursor:pointer;background:transparent;color:var(--ink);transition:.12s}
  .tbtn:hover{background:rgba(16,36,58,.07)}
  .tbtn:disabled{opacity:.3;cursor:not-allowed}
  .tbtn.danger:hover{background:rgba(196,58,42,.1);border-color:#c43a2a;color:#c43a2a}

  .canvas-wrap{position:relative;width:100%;line-height:0}
  canvas{display:block;width:100%;touch-action:none}
  #draw-canvas{position:absolute;top:0;left:0;width:100%;cursor:crosshair}

  .status{font-family:'DM Mono',monospace;font-size:12px;padding:10px 14px;border-top:2px solid var(--ink);opacity:.6;background:var(--paper);min-height:38px}
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="../../">&larr; All apps</a>
  <header>
    <div class="kicker">Hose Planner</div>
    <h1>Plan your <em>watering</em> routes</h1>
    <p class="standfirst">Draw hose runs over your allotment plot grid. Undo, redo, and clear anytime.</p>
  </header>
  <div class="panel">
    <div class="toolbar">
      <label>Colour</label>
      <div class="swatches">
        <span class="swatch sel" style="background:#1D9E75" data-color="#1D9E75" title="Green"></span>
        <span class="swatch" style="background:#378ADD" data-color="#378ADD" title="Blue"></span>
        <span class="swatch" style="background:#D85A30" data-color="#D85A30" title="Orange"></span>
        <span class="swatch" style="background:#888780" data-color="#888780" title="Grey"></span>
      </div>
      <label style="margin-left:6px">Width</label>
      <div class="thickness-group">
        <input type="range" min="3" max="20" value="8" step="1" id="thickness">
        <span class="thick-out" id="thick-out">8</span>
      </div>
      <div class="toolbar-btns">
        <button class="tbtn" id="btn-undo" disabled>&#8617; Undo</button>
        <button class="tbtn" id="btn-redo" disabled>&#8618; Redo</button>
        <button class="tbtn danger" id="btn-clear">Clear</button>
      </div>
    </div>
    <div class="canvas-wrap">
      <canvas id="grid-canvas"></canvas>
      <canvas id="draw-canvas"></canvas>
    </div>
    <div class="status" id="status">Draw hose runs across your plot</div>
  </div>
</div>
<script type="module" src="./app.js"></script>
</body>
</html>
