<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hose Planner — draw watering routes over your allotment plot grid</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10243a;--paper:#f6f1e7;--card:#fffdf8;
    --accent:#2d9e5f;--accent2:#b8e6c8;
    --hair:rgba(16,36,58,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Newsreader',serif;background:var(--paper);color:var(--ink)}
  .wrap{max-width:720px;margin:0 auto;padding:0 18px 70px}

  header{padding:34px 0 14px;border-bottom:2px solid var(--ink)}
  .kicker{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);font-weight:500}
  header h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(40px,9vw,68px);line-height:.92;letter-spacing:-2px;margin:6px 0 0}
  header h1 em{font-family:'Newsreader',serif;font-style:italic;font-weight:400;color:var(--accent)}
  .standfirst{font-size:16px;max-width:46ch;margin-top:12px;opacity:.8;line-height:1.45}

  .panel{background:var(--card);border:2px solid var(--ink);margin-top:26px;box-shadow:6px 6px 0 var(--ink);padding:20px 18px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Hose Planner</div>
    <h1>Plot your <em>watering</em> route</h1>
    <p class="standfirst">Draw watering routes over your allotment plot grid.</p>
  </header>
  <div class="panel" id="app"></div>
</div>
<script type="module" src="./app.js"></script>
</body>
</html>
