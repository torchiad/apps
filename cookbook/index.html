<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kuharica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>

/* ── Reset ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; height: 100%; }
body { font-family: 'Caveat', cursive; background: #1c3540; min-height: 100dvh; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; }
a { text-decoration: none; color: inherit; }

/* ── Cover ───────────────────────────────────────────── */
#cover {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: flex-end; justify-content: flex-start;
  padding: 44px 34px 50px;
  transition: opacity 0.7s ease;
}
#cover.out { opacity: 0; pointer-events: none; }

#cover-svg { position: absolute; inset: 0; width: 100%; height: 100%; }

.cover-bottom {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; gap: 14px;
  align-items: flex-start;
}
.cover-label {
  border: 1.5px solid #c8a44e;
  padding: 9px 20px 8px;
  display: inline-block;
}
.cover-script {
  font-family: 'Dancing Script', cursive;
  font-weight: 700; font-size: 40px;
  color: #c8a44e; line-height: 1; display: block;
}
.cover-open {
  font-family: 'Caveat', cursive;
  font-size: 21px; font-weight: 700;
  color: #1c3540; background: #c8a44e;
  border: none; border-radius: 5px;
  padding: 11px 30px;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
  transition: transform 0.15s, box-shadow 0.15s;
}
.cover-open:active { transform: translate(1px,1px); box-shadow: 2px 2px 0 rgba(0,0,0,0.3); }

/* ── Notebook shell ──────────────────────────────────── */
/* Lines at 36 px intervals to match larger recipe font  */
#app {
  max-width: 720px;
  margin: 0 auto;
  min-height: 100dvh;
  background-color: #f7f3e5;
  background-image:
    linear-gradient(90deg,
      transparent 55px,
      rgba(210,80,80,0.2) 55px,
      rgba(210,80,80,0.2) 57px,
      transparent 57px
    ),
    repeating-linear-gradient(
      transparent 0px, transparent 35px,
      rgba(110,130,200,0.17) 35px, rgba(110,130,200,0.17) 36px
    );
}

/* Desktop: two-column category grid */
@media (min-width: 600px) {
  .cat-list { padding: 8px 16px 60px; }
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .cat-row  { border: 1px solid rgba(110,130,200,0.14); border-radius: 0; }
}

/* ── Header ──────────────────────────────────────────── */
.hdr {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; min-height: 54px;
  background: rgba(247,243,229,0.96);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(110,130,200,0.17);
}
.hdr-back {
  font-size: 26px; color: #c94040;
  line-height: 1; padding: 2px 4px;
  flex: none; display: none;
}
.hdr-title {
  font-family: 'Dancing Script', cursive;
  font-size: 26px; font-weight: 700;
  color: #2a1e14; flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hdr-action {
  font-size: 17px; color: rgba(42,30,20,0.45);
  padding: 4px 8px; flex: none; display: none;
}

/* ── Home – hero + category list ────────────────────── */
.home-hero {
  text-align: center;
  padding: 48px 24px 36px;
  border-bottom: 1px solid rgba(110,130,200,0.18);
}
.home-hero-title {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(48px, 12vw, 72px); font-weight: 700;
  color: #2a1e14; line-height: 1; margin-bottom: 10px;
}
.home-hero-sub {
  font-size: 22px; color: rgba(42,30,20,0.45); margin-bottom: 28px;
}
.home-hero-btn {
  display: inline-block;
  font-family: 'Caveat', cursive;
  font-size: 24px; font-weight: 700;
  color: white; background: #c94040;
  border: 2px solid rgba(0,0,0,0.1); border-radius: 8px;
  padding: 12px 36px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.15);
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
}
.home-hero-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 rgba(0,0,0,0.15); }

.home-cat-head {
  padding: 18px 16px 6px 72px;
  font-size: 16px; color: rgba(42,30,20,0.38);
  letter-spacing: 1px; text-transform: uppercase; font-weight: 700;
}
.cat-list { padding: 4px 0 60px; }
.cat-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px 13px 72px;
  border-bottom: 1px solid rgba(110,130,200,0.14);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.cat-row:active { background: rgba(201,64,64,0.06); }
.cat-icon  { font-size: 24px; flex: none; }
.cat-info  { flex: 1; min-width: 0; }
.cat-hr    { display: block; font-size: 24px; font-weight: 600; color: #2a1e14; line-height: 1.1; }
.cat-en    { display: block; font-size: 16px; color: rgba(42,30,20,0.42); }
.cat-count { font-size: 16px; color: rgba(42,30,20,0.36); flex: none; }
.cat-arrow { font-size: 22px; color: #c94040; flex: none; }

/* ── Recipe list ─────────────────────────────────────── */
.recipe-list { padding: 0 0 60px; }
.recipe-row {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 14px 72px;
  border-bottom: 1px solid rgba(110,130,200,0.14);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  transition: background 0.1s;
}
.recipe-row:active { background: rgba(201,64,64,0.06); }
.rr-body  { flex: 1; min-width: 0; }
.rr-hr    { font-size: 22px; font-weight: 600; color: #2a1e14; line-height: 1.15; }
.rr-en    { font-size: 16px; color: rgba(42,30,20,0.42); }
.rr-arrow { font-size: 20px; color: #c94040; flex: none; }
.list-empty {
  padding: 50px 16px 20px 72px;
  font-size: 22px; color: rgba(42,30,20,0.38); line-height: 1.7;
}

/* ── Recipe view ─────────────────────────────────────── */
/* padding-top 18px: header 54px + 18px = 72px = 2×36 grid */
.recipe-view { padding: 18px 20px 60px 72px; }

/* Croatian title: double-rectangle box */
.title-hr { display: inline-block; position: relative; margin-bottom: 6px; }
.title-hr-inner {
  display: inline-block;
  font-size: 24px; font-weight: 700;
  color: #c94040; text-transform: uppercase; letter-spacing: 0.5px;
  line-height: 1.25;
  border: 2px solid #c94040;
  padding: 5px 12px;
}
.title-hr::after {
  content: '';
  position: absolute; inset: 4px -5px -5px 4px;
  border: 1.5px solid rgba(201,64,64,0.32);
  pointer-events: none;
}

/* English title: ruffle / scroll banner */
.title-en { display: flex; align-items: stretch; margin-top: 10px; margin-bottom: 18px; }
.ruffle-cap {
  width: 18px; flex: none; background: #f0ebd8;
  border: 2px solid #c94040; border-right: none;
  border-radius: 4px 0 0 4px; position: relative;
}
.ruffle-cap-r { border-right: 2px solid #c94040; border-left: none; border-radius: 0 4px 4px 0; }
.ruffle-cap::after {
  content: ''; position: absolute;
  top: 18%; bottom: 18%; left: 50%;
  width: 1px; background: rgba(201,64,64,0.28);
}
.ruffle-text {
  flex: 1;
  border-top: 2px solid #c94040; border-bottom: 2px solid #c94040;
  padding: 5px 10px;
  font-size: 18px; font-weight: 600;
  color: #c94040; text-transform: uppercase;
  letter-spacing: 0.5px; text-align: center; line-height: 1.3;
}

/* Language toggle */
.lang-toggle {
  display: flex; gap: 0; justify-content: flex-end;
  margin-bottom: 20px;
  border-bottom: 1px solid rgba(110,130,200,0.17);
  padding-bottom: 10px;
}
.lang-btn {
  font-family: 'Caveat', cursive;
  font-size: 18px; font-weight: 700;
  padding: 4px 16px;
  border: 1.5px solid #c94040;
  color: #c94040; background: transparent; line-height: 1.4;
}
.lang-btn:first-child { border-radius: 4px 0 0 4px; border-right: none; }
.lang-btn:last-child  { border-radius: 0 4px 4px 0; }
.lang-btn.active { background: #c94040; color: white; }

/* Section headings — handwritten underline style */
.recipe-lbl {
  font-size: 22px; font-weight: 700; color: #c94040;
  margin: 24px 0 0; display: inline-block;
  border-bottom: 1.5px solid rgba(201,64,64,0.4);
  padding-bottom: 1px; line-height: 36px;
}

/* Body text — 36 px line-height matches the ruled grid */
.recipe-body {
  font-size: 22px; line-height: 36px;
  color: #2a1e14; white-space: pre-wrap;
  display: block; margin-top: 0;
}

/* ── Add / Edit form ─────────────────────────────────── */
.form-page { padding: 8px 0 60px; }
.form-lbl {
  display: block;
  font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(42,30,20,0.38);
  padding: 18px 16px 4px 72px;
}
.form-field {
  width: 100%; background: transparent;
  border: none; border-bottom: 1px solid rgba(201,64,64,0.22);
  padding: 6px 16px 8px 72px;
  font-size: 22px; color: #2a1e14;
  outline: none; resize: none; display: block;
}
.form-field:focus { border-bottom-color: #c94040; }
.form-field::placeholder { color: rgba(42,30,20,0.26); }
.form-actions { padding: 28px 16px 0; }
.btn-save {
  display: block; width: 100%;
  background: #c94040; color: white;
  font-size: 22px; font-weight: 700;
  border: 2px solid rgba(0,0,0,0.1); border-radius: 8px;
  padding: 14px;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.15); text-align: center;
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn-save:active { transform: translate(1px,1px); box-shadow: 2px 2px 0 rgba(0,0,0,0.15); }
.btn-delete {
  display: block; width: 100%; margin-top: 12px;
  font-size: 18px; color: rgba(42,30,20,0.38);
  border: 1.5px solid rgba(42,30,20,0.16); border-radius: 8px;
  padding: 11px; text-align: center;
}

</style>
</head>
<body>

<!-- ── Cover ──────────────────────────────────────────── -->
<div id="cover">

  <svg id="cover-svg" viewBox="0 0 390 844"
       xmlns="http://www.w3.org/2000/svg"
       preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="g-base" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"   stop-color="#c8eaee"/>
        <stop offset="25%"  stop-color="#72c4cc"/>
        <stop offset="55%"  stop-color="#42a8b4"/>
        <stop offset="80%"  stop-color="#267888"/>
        <stop offset="100%" stop-color="#165060"/>
      </linearGradient>
      <radialGradient id="g-highlight" cx="14%" cy="8%" r="52%">
        <stop offset="0%"   stop-color="rgba(255,255,255,0.30)"/>
        <stop offset="100%" stop-color="transparent"/>
      </radialGradient>
      <filter id="marble" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence type="turbulence"
          baseFrequency="0.013 0.007" numOctaves="4" seed="9" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n"
          scale="65" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
    <rect width="390" height="844" fill="url(#g-base)"/>
    <g filter="url(#marble)">
      <line x1="-70" y1="740" x2="490" y2="475" stroke="white" stroke-width="48" stroke-linecap="round" opacity="0.90"/>
      <line x1="-70" y1="695" x2="490" y2="430" stroke="white" stroke-width="22" stroke-linecap="round" opacity="0.75"/>
      <line x1="-70" y1="658" x2="490" y2="393" stroke="white" stroke-width="11" stroke-linecap="round" opacity="0.82"/>
      <line x1="-70" y1="628" x2="490" y2="363" stroke="white" stroke-width="5"  stroke-linecap="round" opacity="0.60"/>
      <line x1="-70" y1="762" x2="490" y2="497" stroke="#c89855" stroke-width="13" stroke-linecap="round" opacity="0.58"/>
      <line x1="-70" y1="749" x2="490" y2="484" stroke="#e8cc88" stroke-width="5"  stroke-linecap="round" opacity="0.42"/>
      <line x1="270" y1="860" x2="316" y2="-20" stroke="#0c1e2e" stroke-width="7" stroke-linecap="round" opacity="0.48"/>
      <line x1="280" y1="860" x2="326" y2="-20" stroke="#0c1e2e" stroke-width="3" stroke-linecap="round" opacity="0.28"/>
    </g>
    <rect width="390" height="844" fill="url(#g-highlight)"/>
  </svg>

  <div class="cover-bottom">
    <div class="cover-label"><span class="cover-script">Kuharica</span></div>
    <button class="cover-open" id="cover-open-btn">Otvori kuharicu →</button>
  </div>

</div>


<!-- ── App ────────────────────────────────────────────── -->
<div id="app">

  <header class="hdr" id="hdr">
    <button class="hdr-back" id="back-btn">←</button>
    <div class="hdr-title" id="hdr-title">Kuharica</div>
    <button class="hdr-action" id="hdr-action">Uredi</button>
  </header>

  <main id="main"></main>

</div>


<script>

/* ── Categories ──────────────────────────────────────── */
const CATS = [
  { id: 'juhe',     hr: 'Juhe',           en: 'Soups',          icon: '🍲' },
  { id: 'predjela', hr: 'Predjela',        en: 'Starters',       icon: '🥗' },
  { id: 'glavna',   hr: 'Glavna Jela',     en: 'Mains',          icon: '🍽️'  },
  { id: 'salate',   hr: 'Salate',          en: 'Salads',         icon: '🥙' },
  { id: 'deserti',  hr: 'Deserti',         en: 'Desserts',       icon: '🍰' },
  { id: 'kruh',     hr: 'Kruh & Tijesto',  en: 'Bread & Pastry', icon: '🥖' },
  { id: 'ostalo',   hr: 'Ostalo',          en: 'Other',          icon: '📌' },
];

/* ── Default recipes (bilingual) ─────────────────────── */
const DEFAULTS = [
  {
    id: 'fritterice',
    nameHr: 'Friterke od Tikvica', nameEn: 'Courgette Fritters', cat: 'predjela',
    ingredientsHr: '- 120g tikvice\n- 1/2 žličice soli',
    ingredientsEn: '- 120g courgette\n- 1/2 tsp salt',
    methodHr: 'Naribajte tikvice (nemojte ih guliti).\nDodajte sol i ostavite nekoliko minuta. Ocijedite vodu.\n\nDodajte sljedeće:\n- 1 veliko jaje\n- 1/2 žličice praška za pecivo\n- 3 žlice glatkog brašna\n- cca 35g ribanog parmezana\n\nPržite na plitkom ulju koristeći žlicu za mjerenje.',
    methodEn: 'Grate the courgette (do not peel it).\nAdd the salt and let it sit for a few min. Drain the water.\n\nAdd following:\n- 1 large egg\n- 1/2 tsp baking powder\n- 3 tbsp plain flour\n- cca 35g grated parmesan cheese\n\nShallow fry them by using tablespoon as a measurement.',
  },
  {
    id: 'jufka',
    nameHr: 'Jufka', nameEn: 'Filo Pastry', cat: 'kruh',
    ingredientsHr: '- 500g brašna za kruh\n- sol\n- 1 žlica suncokretovog ulja\n- 350ml mlake vode',
    ingredientsEn: '- 500g bread flour\n- salt\n- 1 tbsp sunflower oil\n- 350ml lukewarm water',
    methodHr: 'Formirajte kuglu, stavite u nauljenu posudu, prelijte uljem i pokrijte.\nOstavite u hladnjaku 1–2:30 sati. Najbolje je ostaviti preko noći.\n\nKad ga koristite, izvadite iz hladnjaka 10–15 min prije razvlačenja.\n\nSve pite se peku u pećnici na 250°c oko 20 minuta.',
    methodEn: 'Form into ball, place in oily container, oil it on top and cover.\nLeave in fridge 1–2:30 hours. Best if left overnight.\n\nOnce you want to use it, take out of the fridge 10–15 min before stretching.\n\nAll pies are baked in oven at 250°c around 20 min.',
  },
  {
    id: 'burek',
    nameHr: 'Burek', nameEn: 'Meat Pie', cat: 'glavna',
    ingredientsHr: '- 1/2 kg mljevenog goveđeg mesa\n- 1 veliki luk, sitno nasjeckan\n- 2 žličice soli\n- 1 žličica papra\n- 1 šotica vode',
    ingredientsEn: '- 1/2 kg mince beef\n- 1 large onion, diced fine\n- 2 tsp salt\n- 1 tsp pepper\n- 1 shot glass water',
    methodHr: 'Sve pomiješajte i koristite s jufkom (tijestom za pitu).',
    methodEn: 'Mix all and use with filo pastry.',
  },
  {
    id: 'peksimeti',
    nameHr: 'Peksimeti', nameEn: 'Peksimeti', cat: 'kruh',
    ingredientsHr: '- 2 srednja jaja\n- 250g grčkog jogurta\n- 1 žličica soli\n- 1 žličica (12g) praška za pecivo\n- 2–3 šalice glatkog brašna',
    ingredientsEn: '- 2 medium eggs\n- 250g greek yoghurt\n- 1 tsp salt\n- 1 tsp (12g) baking powder\n- 2–3 cups plain flour',
    methodHr: 'Sve pomiješajte i pržite na ulju.',
    methodEn: 'Mix all and fry in oil.',
  },
  {
    id: 'lepinja',
    nameHr: 'Lepinja', nameEn: 'Balkan Flatbread', cat: 'kruh',
    ingredientsHr: '- 180ml mlake vode + 2¼ žličice suhog kvasca (pomiješajte i ostavite)\n- 180ml mlakog mlijeka\n- 2 žlice suncokretovog ulja\n- 500g brašna za kruh\n- 1 žličica šećera\n- 1 žličica soli',
    ingredientsEn: '- 180ml lukewarm water + 2¼ tsp dry yeast (mix & leave to activate)\n- 180ml lukewarm milk\n- 2 tbsp sunflower oil\n- 500g bread flour\n- 1 tsp sugar\n- 1 tsp salt',
    methodHr: 'Pomiješajte mokre sastojke, zatim dodajte suhe.\nDobijete 4 lepinje (ili 6 malih).\n\nOstavite dizano tijesto da se odmori 10–15 min.\nOblikujte rukom, zarezite linije hrptom noža.\n\nPecite 8–12 min na 250°c dok ne bude zlatno.\nOdmah poprskajte vodom i zamotajte u ručnik 10–15 min za meku teksturu.',
    methodEn: 'Mix wet ingredients first, then add dry.\nMakes 4 flatbreads (or 6 small).\n\nRest risen dough for 10–15 min.\nShape by hand, press lines with the back of a knife.\n\nBake 8–12 min at 250°c until golden.\nImmediately sprinkle with water and wrap in a towel for 10–15 min for soft texture.',
  },
];

/* ── localStorage helpers ────────────────────────────── */
function migrateRecipe(r) {
  if ('ingredientsEn' in r) return r;
  const { ingredients, method, ...rest } = r;
  return { ...rest, ingredientsHr: '', ingredientsEn: ingredients || '', methodHr: '', methodEn: method || '' };
}

function db() {
  try {
    const rows = JSON.parse(localStorage.getItem('kuharica.v1') || '[]');
    return rows.map(migrateRecipe);
  } catch { return []; }
}

function dbSave(rows) { localStorage.setItem('kuharica.v1', JSON.stringify(rows)); }

function seedDefaults() {
  const existing = db();
  const ids      = new Set(existing.map(r => r.id));
  const toAdd    = DEFAULTS.filter(r => !ids.has(r.id));
  if (toAdd.length) dbSave([...existing, ...toAdd]);
}

/* ── Navigation state ────────────────────────────────── */
let page     = 'home';
let catId    = null;
let recipeId = null;
let lang     = localStorage.getItem('kuharica.lang') || 'hr';

function setLang(l) {
  lang = l;
  localStorage.setItem('kuharica.lang', l);
  document.getElementById('main').innerHTML = pageRecipe();
}

function nav(p, c, r) {
  page = p;
  if (c !== undefined) catId    = c;
  if (r !== undefined) recipeId = r;
  render();
  window.scrollTo(0, 0);
}

/* ── HTML helpers ────────────────────────────────────── */
function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function attr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
function ruffleLeft()  { return `<div class="ruffle-cap"></div>`; }
function ruffleRight() { return `<div class="ruffle-cap ruffle-cap-r"></div>`; }

/* ── Page: Home ──────────────────────────────────────── */
function pageHome() {
  const rows   = db();
  const counts = {};
  rows.forEach(r => { counts[r.cat] = (counts[r.cat] || 0) + 1; });
  const total  = rows.length;

  return `
    <div class="home-hero">
      <div class="home-hero-title">Kuharica</div>
      <div class="home-hero-sub">${total} ${total === 1 ? 'recept' : 'recepata'}</div>
      <button class="home-hero-btn" onclick="nav('category','glavna')">Pregledaj recepte</button>
    </div>
    <p class="home-cat-head">Kategorije</p>
    <div class="cat-list">
      <div class="cat-grid">
        ${CATS.map(c => `
          <div class="cat-row" onclick="nav('category','${c.id}')">
            <span class="cat-icon">${c.icon}</span>
            <span class="cat-info">
              <span class="cat-hr">${c.hr}</span>
              <span class="cat-en">${c.en}</span>
            </span>
            <span class="cat-count">${counts[c.id] || 0}</span>
            <span class="cat-arrow">›</span>
          </div>
        `).join('')}
      </div>
    </div>`;
}

/* ── Page: Category (recipe list) ────────────────────── */
function pageCategory() {
  const rows = db().filter(r => r.cat === catId);

  if (!rows.length) {
    return `<p class="list-empty">Nema recepata još.<br>Pritisni + u zaglavlju za dodavanje.</p>`;
  }

  return `<div class="recipe-list">
    ${rows.map(r => `
      <div class="recipe-row" onclick="nav('recipe','${catId}','${r.id}')">
        <div class="rr-body">
          <div class="rr-hr">${esc(r.nameHr)}</div>
          ${r.nameEn ? `<div class="rr-en">${esc(r.nameEn)}</div>` : ''}
        </div>
        <span class="rr-arrow">›</span>
      </div>
    `).join('')}
  </div>`;
}

/* ── Page: Recipe view (single language with toggle) ─── */
function pageRecipe() {
  const r = db().find(x => x.id === recipeId);
  if (!r) return `<p class="list-empty">Recept nije pronađen.</p>`;

  const isHr       = lang === 'hr';
  const ingredients = isHr ? r.ingredientsHr : r.ingredientsEn;
  const method      = isHr ? r.methodHr      : r.methodEn;
  const lblIng      = isHr ? 'Sastojci'      : 'Ingredients';
  const lblMth      = isHr ? 'Priprema'      : 'Method';

  const enBanner = r.nameEn ? `
    <div class="title-en">
      ${ruffleLeft()}
      <div class="ruffle-text">${esc(r.nameEn.toUpperCase())}</div>
      ${ruffleRight()}
    </div>` : '';

  return `<div class="recipe-view">

    <div class="lang-toggle">
      <button class="lang-btn ${isHr ? 'active' : ''}" onclick="setLang('hr')">HR</button>
      <button class="lang-btn ${!isHr ? 'active' : ''}" onclick="setLang('en')">EN</button>
    </div>

    <div class="title-hr">
      <div class="title-hr-inner">${esc(r.nameHr.toUpperCase())}</div>
    </div>

    ${enBanner}

    ${ingredients ? `
      <p class="recipe-lbl">${lblIng}</p>
      <p class="recipe-body">${esc(ingredients)}</p>
    ` : ''}

    ${method ? `
      <p class="recipe-lbl">${lblMth}</p>
      <p class="recipe-body">${esc(method)}</p>
    ` : ''}

  </div>`;
}

/* ── Page: Add / Edit form ───────────────────────────── */
function pageForm(editId) {
  const r    = editId ? db().find(x => x.id === editId) : null;
  const opts = CATS.map(c =>
    `<option value="${c.id}" ${(r ? r.cat : catId) === c.id ? 'selected' : ''}>${c.hr} / ${c.en}</option>`
  ).join('');

  return `<div class="form-page">

    <label class="form-lbl">Naziv (HR)</label>
    <input  class="form-field" id="f-hr" type="text"
            placeholder="Naziv recepta…"
            value="${attr(r?.nameHr || '')}" autocomplete="off">

    <label class="form-lbl">Name (EN)</label>
    <input  class="form-field" id="f-en" type="text"
            placeholder="Recipe name…"
            value="${attr(r?.nameEn || '')}" autocomplete="off">

    <label class="form-lbl">Kategorija / Category</label>
    <select class="form-field" id="f-cat">${opts}</select>

    <label class="form-lbl">Sastojci (HR)</label>
    <textarea class="form-field" id="f-ing-hr" rows="5"
              placeholder="- 500g brašno&#10;- 1 žlica soli…">${esc(r?.ingredientsHr || '')}</textarea>

    <label class="form-lbl">Ingredients (EN)</label>
    <textarea class="form-field" id="f-ing-en" rows="5"
              placeholder="- 500g flour&#10;- 1 tbsp salt…">${esc(r?.ingredientsEn || '')}</textarea>

    <label class="form-lbl">Priprema (HR)</label>
    <textarea class="form-field" id="f-mth-hr" rows="7"
              placeholder="Pomiješaj sastojke…">${esc(r?.methodHr || '')}</textarea>

    <label class="form-lbl">Method (EN)</label>
    <textarea class="form-field" id="f-mth-en" rows="7"
              placeholder="Mix ingredients…">${esc(r?.methodEn || '')}</textarea>

    <div class="form-actions">
      <button class="btn-save"
              onclick="saveRecipe(${editId ? `'${editId}'` : 'null'})">
        ${editId ? 'Spremi promjene' : 'Dodaj recept'}
      </button>
      ${editId
        ? `<button class="btn-delete" onclick="deleteRecipe('${editId}')">Obriši recept</button>`
        : ''}
    </div>

  </div>`;
}

/* ── Actions ─────────────────────────────────────────── */
function saveRecipe(editId) {
  const nameHr = document.getElementById('f-hr').value.trim();
  if (!nameHr) { alert('Upiši naziv recepta!'); return; }

  const rows = db();
  const payload = {
    id:            editId || Math.random().toString(36).slice(2),
    nameHr,
    nameEn:        document.getElementById('f-en').value.trim(),
    cat:           document.getElementById('f-cat').value,
    ingredientsHr: document.getElementById('f-ing-hr').value.trim(),
    ingredientsEn: document.getElementById('f-ing-en').value.trim(),
    methodHr:      document.getElementById('f-mth-hr').value.trim(),
    methodEn:      document.getElementById('f-mth-en').value.trim(),
  };

  if (editId) {
    const i = rows.findIndex(r => r.id === editId);
    rows[i] = payload;
  } else {
    rows.push(payload);
  }

  dbSave(rows);
  nav('recipe', payload.cat, payload.id);
}

function deleteRecipe(id) {
  if (!confirm('Obrisati recept?')) return;
  dbSave(db().filter(r => r.id !== id));
  nav('home');
}

/* ── Render ──────────────────────────────────────────── */
function render() {
  const main      = document.getElementById('main');
  const backBtn   = document.getElementById('back-btn');
  const titleEl   = document.getElementById('hdr-title');
  const actionBtn = document.getElementById('hdr-action');

  backBtn.style.display   = page === 'home' ? 'none' : '';
  actionBtn.style.display = 'none';
  actionBtn.onclick = null;

  switch (page) {

    case 'home':
      titleEl.textContent = 'Kuharica';
      main.innerHTML = pageHome();
      break;

    case 'category': {
      const cat = CATS.find(c => c.id === catId);
      titleEl.textContent = cat ? cat.hr : '';
      actionBtn.textContent    = '+';
      actionBtn.style.display  = '';
      actionBtn.style.fontSize = '26px';
      actionBtn.onclick = () => nav('add');
      main.innerHTML = pageCategory();
      break;
    }

    case 'recipe': {
      const r = db().find(x => x.id === recipeId);
      titleEl.textContent      = r ? r.nameHr : 'Recept';
      actionBtn.textContent    = 'Uredi';
      actionBtn.style.display  = '';
      actionBtn.style.fontSize = '17px';
      actionBtn.onclick = () => nav('edit', catId, recipeId);
      main.innerHTML = pageRecipe();
      break;
    }

    case 'add':
      titleEl.textContent = 'Novi recept';
      main.innerHTML = pageForm(null);
      break;

    case 'edit':
      titleEl.textContent = 'Uredi recept';
      main.innerHTML = pageForm(recipeId);
      break;
  }
}

/* ── Event listeners ─────────────────────────────────── */
document.getElementById('back-btn').addEventListener('click', () => {
  if (page === 'edit') nav('recipe', catId, recipeId);
  else nav('home');
});

function openApp() {
  document.getElementById('cover').classList.add('out');
  setTimeout(() => { document.getElementById('cover').style.display = 'none'; }, 700);
}
document.getElementById('cover-open-btn').addEventListener('click', openApp);
document.getElementById('cover').addEventListener('click', e => {
  if (e.target === document.getElementById('cover-open-btn')) return;
  openApp();
});

/* ── Boot ────────────────────────────────────────────── */
seedDefaults();
render();

</script>
</body>
</html>
